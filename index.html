<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="src/styles.css" />
        <title>Color Palette Generator</title>
    </head>
    <body>
        <header>
            <span style="color: #ff3333">Color</span>
            <span style="color: #779933">Palette</span>
            <span style="color: #0092cc">Generator</span>
        </header>
        <main>
            <button id="generetePaletteBtn">Generate</button>
            <div id="paletteContainer">
                <div id="color1" class="colorBoxes">#ffffff</div>
                <div id="color2" class="colorBoxes">#98ab33</div>
                <div id="color3" class="colorBoxes">3</div>
                <div id="color4" class="colorBoxes">4</div>
                <div id="color5" class="colorBoxes">5</div>
            </div>
        </main>
    </body>
    <script src="src/main.js" type="module"></script>
</html>
